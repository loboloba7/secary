<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirección de Mercados - GAD Cuenca</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --guinda: #8B1D1D; --dorado: #CFAE70; --gris: #f4f4f4; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--gris); }

        header { 
            background: var(--guinda); color: white; padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            border-top: 5px solid var(--dorado); min-height: 380px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        h3 { color: var(--guinda); font-size: 0.9rem; margin-bottom: 15px; border-left: 4px solid var(--guinda); padding-left: 10px; text-transform: uppercase; }
        
        #status { font-size: 0.7rem; padding: 5px 12px; border-radius: 4px; background: #6c757d; font-weight: bold; }

        .links-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-link { 
            padding: 10px; border: 1px solid var(--guinda); color: var(--guinda); 
            text-decoration: none; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem;
        }
        .btn-sync {
            width: 100%; margin-top: 15px; padding: 12px; background: var(--guinda); 
            color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .chart-container { position: relative; height: 280px; width: 100%; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>DIRECCIÓN DE MERCADOS | GAD CUENCA</h1>
        <small>Usuario: ipoveda | Archivo: pantalla.xlsx</small>
    </div>
    <div id="status">ESTADO: Iniciando...</div>
</header>

<div class="container">
    <div class="dashboard-grid">
        <div class="card">
            <h3>Adjudicaciones vs Renovaciones</h3>
            <div class="chart-container"><canvas id="chart1"></canvas></div>
        </div>
        <div class="card">
            <h3>Estado de Legalizaciones</h3>
            <div class="chart-container"><canvas id="chart2"></canvas></div>
        </div>
        <div class="card">
            <h3>Monitoreo de Renuncias</h3>
            <div class="chart-container"><canvas id="chart3"></canvas></div>
        </div>
        <div class="card">
            <h3>Enlaces de Gestión Directa</h3>
            <div class="links-container">
                <a href="#" class="btn-link">Mercados Pequeños</a>
                <a href="#" class="btn-link">Mercados Grandes</a>
                <a href="#" class="btn-link">Comercio Autónomo</a>
                <a href="#" class="btn-link">Pagos en Línea</a>
            </div>
            <button class="btn-sync" onclick="cargarDatosExcel()">SINCRONIZAR EXCEL AHORA</button>
        </div>
    </div>
</div>

<script>
    // Guardamos las instancias de los gráficos para que no se dupliquen
    let chartInstances = {};

    const datosDemo = {
        labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
        adjudicaciones: [12, 19, 15, 25, 22, 30],
        renovaciones: [8, 12, 10, 15, 18, 20],
        legalizaciones: [5, 10, 8, 12, 15, 10],
        renuncias: [2, 4, 1, 3, 2, 5]
    };

    async function cargarDatosExcel() {
        const status = document.getElementById('status');
        try {
            // Ponemos un timeout corto para que no se quede "colgado" esperando al servidor
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 2000);

            const res = await fetch('http://localhost:5000/api/datos', { signal: controller.signal });
            clearTimeout(id);

            if (!res.ok) throw new Error();
            
            const data = await res.json();
            status.innerText = "CONECTADO: pantalla.xlsx";
            status.style.background = "#28a745";
            actualizarInterfaz(data);
        } catch (err) {
            console.log("Servidor no disponible, usando datos locales.");
            status.innerText = "MODO OFFLINE (DEMO)";
            status.style.background = "#8B1D1D"; 
            actualizarInterfaz(datosDemo);
        }
    }

    function actualizarInterfaz(data) {
        // Grafico 1: Lineas
        render('chart1', 'line', data.labels, [
            { label: 'Adjudicaciones', data: data.adjudicaciones, borderColor: '#8B1D1D', backgroundColor: 'rgba(139,29,29,0.1)', fill: true },
            { label: 'Renovaciones', data: data.renovaciones, borderColor: '#CFAE70', fill: false }
        ]);

        // Grafico 2: Barras
        render('chart2', 'bar', data.labels, [
            { label: 'Legalizaciones', data: data.legalizaciones, backgroundColor: '#8B1D1D' }
        ]);

        // Grafico 3: Linea simple
        render('chart3', 'line', data.labels, [
            { label: 'Renuncias', data: data.renuncias, borderColor: '#333', tension: 0.3 }
        ]);
    }

    function render(id, tipo, labels, datasets) {
        const ctx = document.getElementById(id).getContext('2d');
        
        // Si el gráfico ya existe, lo destruimos antes de crearlo de nuevo
        if (chartInstances[id]) {
            chartInstances[id].destroy();
        }

        chartInstances[id] = new Chart(ctx, {
            type: tipo,
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 1000 } // Animación suave para que veas que cargó
            }
        });
    }

    // Ejecutar al cargar la página
    document.addEventListener('DOMContentLoaded', cargarDatosExcel);
</script>
</body>
</html>
