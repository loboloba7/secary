<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Dinámico - GAD Cuenca</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --guinda: #8B1D1D; --dorado: #CFAE70; --gris: #f4f4f4; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--gris); overflow-x: hidden; }

        header { 
            background: var(--guinda); color: white; padding: 1rem 2rem; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid var(--dorado);
        }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        
        .card { 
            background: white; padding: 20px; border-radius: 12px; 
            border-top: 5px solid var(--dorado); min-height: 380px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        
        h3 { color: var(--guinda); font-size: 0.9rem; margin-bottom: 15px; border-left: 4px solid var(--guinda); padding-left: 10px; text-transform: uppercase; }
        
        #status { font-size: 0.7rem; padding: 5px 12px; border-radius: 20px; background: #28a745; font-weight: bold; color: white; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .links-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-link { 
            padding: 10px; border: 1px solid var(--guinda); color: var(--guinda); 
            text-decoration: none; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem; transition: 0.3s;
        }
        .btn-link:hover { background: var(--guinda); color: white; }
        .btn-sync {
            width: 100%; margin-top: 15px; padding: 12px; background: var(--guinda); 
            color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .chart-container { position: relative; height: 280px; width: 100%; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="font-size: 1.2rem;">DIRECCIÓN DE MERCADOS | GAD CUENCA</h1>
        <small>Monitoreo en Tiempo Real - Usuario: ipoveda</small>
    </div>
    <div id="status">SISTEMA ACTIVO</div>
</header>

<div class="container">
    <div class="dashboard-grid">
        <div class="card">
            <h3>Adjudicaciones vs Renovaciones</h3>
            <div class="chart-container"><canvas id="chart1"></canvas></div>
        </div>
        <div class="card">
            <h3>Estado de Legalizaciones</h3>
            <div class="chart-container"><canvas id="chart2"></canvas></div>
        </div>
        <div class="card">
            <h3>Monitoreo de Renuncias</h3>
            <div class="chart-container"><canvas id="chart3"></canvas></div>
        </div>
        <div class="card">
            <h3>Gestión Operativa</h3>
            <div class="links-container">
                <a href="#" class="btn-link">Mercados Pequeños</a>
                <a href="#" class="btn-link">Mercados Grandes</a>
                <a href="#" class="btn-link">Comercio Autónomo</a>
                <a href="#" class="btn-link">Pagos en Línea</a>
            </div>
            <button class="btn-sync">MODO AUTO-OSCILACIÓN</button>
        </div>
    </div>
</div>

<script>
    let chartInstances = {};
    
    // Datos base
    let currentData = {
        labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
        adjudicaciones: [12, 19, 15, 25, 22, 30],
        renovaciones: [8, 12, 10, 15, 18, 20],
        legalizaciones: [5, 10, 8, 12, 15, 10],
        renuncias: [2, 4, 1, 3, 2, 5]
    };

    function initCharts() {
        const config = (id, type, labels, datasets) => {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: type,
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 2000, easing: 'easeInOutQuart' },
                    scales: { y: { beginAtZero: true } }
                }
            });
        };

        chartInstances['chart1'] = config('chart1', 'line', currentData.labels, [
            { label: 'Adjudicaciones', data: [...currentData.adjudicaciones], borderColor: '#8B1D1D', backgroundColor: 'rgba(139,29,29,0.1)', fill: true, tension: 0.4 },
            { label: 'Renovaciones', data: [...currentData.renovaciones], borderColor: '#CFAE70', tension: 0.4 }
        ]);

        chartInstances['chart2'] = config('chart2', 'bar', currentData.labels, [
            { label: 'Legalizaciones', data: [...currentData.legalizaciones], backgroundColor: '#8B1D1D' }
        ]);

        chartInstances['chart3'] = config('chart3', 'line', currentData.labels, [
            { label: 'Renuncias', data: [...currentData.renuncias], borderColor: '#333', tension: 0.3, fill: false }
        ]);
    }

    // Función que crea la oscilación aleatoria
    function oscilarDatos() {
        const variacion = () => Math.floor(Math.random() * 5) - 2; // Sube o baja hasta 2 puntos

        // Actualizar datos internos
        currentData.adjudicaciones = currentData.adjudicaciones.map(v => Math.max(5, v + variacion()));
        currentData.renovaciones = currentData.renovaciones.map(v => Math.max(5, v + variacion()));
        currentData.legalizaciones = currentData.legalizaciones.map(v => Math.max(2, v + variacion()));
        currentData.renuncias = currentData.renuncias.map(v => Math.max(0, v + variacion()));

        // Aplicar a los gráficos existentes
        chartInstances['chart1'].data.datasets[0].data = currentData.adjudicaciones;
        chartInstances['chart1'].data.datasets[1].data = currentData.renovaciones;
        chartInstances['chart2'].data.datasets[0].data = currentData.legalizaciones;
        chartInstances['chart3'].data.datasets[0].data = currentData.renuncias;

        // Refrescar gráficos
        Object.values(chartInstances).forEach(chart => chart.update());
    }

    document.addEventListener('DOMContentLoaded', () => {
        initCharts();
        // Iniciar la oscilación cada 3 segundos
        setInterval(oscilarDatos, 3000);
    });
</script>
</body>
</html>
